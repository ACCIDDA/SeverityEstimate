name: 'setup R'
description: "Setup R for this particular repository's configuration."
inputs:
  r-version:
    description: 'R version to use.'
    required: false
    default: 'latest'
runs:
  using: 'composite'
  steps:
    - name: 'setup just'
      uses: 'extractions/setup-just@v3'
    - name: 'install pandoc'
      run: 'sudo apt-get install pandoc'
      shell: 'bash'
    - name: 'setup R'
      uses: 'r-lib/actions/setup-r@v2'
      with:
        r-version: '${{ inputs.r-version }}'
    - name: 'setup renv'
      uses: 'r-lib/actions/setup-renv@v2'
    - name: 'install SeverityEstimate'
      run: 'just install'
      shell: 'bash'
