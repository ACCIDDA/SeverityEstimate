name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  ci-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
      - name: Set up renv
        uses: r-lib/actions/setup-renv@v2
      - name: Install Dependencies Including Dev
        run: |
          library(renv)
          renv::install(dependencies="most")
        shell: Rscript {0}
      - name: Build Documentation
        run: |
          library(roxygen2)
          roxygen2::roxygenize()
        shell: Rscript {0}
      - name: Check For Noncommitted Documentation
        run: |
          if [[ $( git status --porcelain ) ]]; then
            echo "Please run roxygen2::roxygenize() and commit the changes."
            exit 1
          fi
      - name: Install SeverityEstimate
        run: |
          R CMD INSTALL .
      - name: Run Lintr
        run: |
          library(SeverityEstimate)
          library(lintr)
          lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true
      - name: Run Tests
        run: |
          library(renv)
          renv::install("devtools")
          library(devtools)
          devtools::test(stop_on_failure=TRUE)
        shell: Rscript {0}
      - name: Run R CMD check
        run: R CMD check . --no-manual --no-tests
