name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup R For SeverityEstimate
        uses: ./.github/actions/setup-r
      - name: Build Roxygen  Documentation
        run: make docs
      - name: Check For Non-Committed Documentation
        run: |
          if [[ $( git status --porcelain ) ]]; then
            echo "Please run roxygen2::roxygenize() and commit the changes."
            exit 1
          fi
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup R For SeverityEstimate
        uses: ./.github/actions/setup-r
      - name: Run Lintr
        run: make lint
        env:
          LINTR_ERROR_ON_LINT: true
  ci-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
      - name: Set up renv
        uses: r-lib/actions/setup-renv@v2
      - name: Install Dependencies Including Dev
        run: |
          library(renv)
          renv::install(dependencies="most")
        shell: Rscript {0}
      - name: Install SeverityEstimate
        run: |
          R CMD INSTALL .
      - name: Run Tests
        run: |
          library(renv)
          renv::install("devtools")
          library(devtools)
          devtools::test(stop_on_failure=TRUE)
        shell: Rscript {0}
      - name: Run R CMD check
        run: R CMD check . --no-manual --no-tests
